<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Caddy</title>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.innerHTML = '<div style="color:red;padding:20px;font-size:12px;font-family:monospace;white-space:pre-wrap;background:#111;min-height:100vh">' +
        'ERROR: ' + msg + '\nFile: ' + src + ':' + line + '\n' + (err ? err.stack : '') + '</div>';
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML = '<div style="color:orange;padding:20px;font-size:12px;font-family:monospace;white-space:pre-wrap;background:#111;min-height:100vh">' +
        'PROMISE ERROR: ' + (e.reason ? e.reason.stack || e.reason.message || e.reason : e.reason) + '</div>';
    });
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
